<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Écrits — VOTRE NOM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cinzel:wght@400;500&family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0e0d0c;--text:#e8e2d8;--muted:rgba(232,226,216,0.45);--faint:rgba(232,226,216,0.12)}
    body{background:var(--bg);color:var(--text);font-family:'Cormorant Garamond',serif;min-height:100vh;overflow-x:hidden}
    body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:100;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");opacity:0.6}
    nav{position:fixed;top:0;left:0;right:0;z-index:50;display:flex;justify-content:space-between;align-items:center;padding:1.5rem 3rem;border-bottom:0.5px solid var(--faint);background:rgba(14,13,12,0.85);backdrop-filter:blur(12px)}
    .nav-name{font-family:'Cinzel',serif;font-size:12px;letter-spacing:0.25em;color:var(--text);text-decoration:none;opacity:0.9}
    .nav-links{display:flex;gap:2.5rem;list-style:none}
    .nav-links a{font-family:'Inter',sans-serif;font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:var(--muted);text-decoration:none;transition:color 0.25s}
    .nav-links a:hover,.nav-links a.active{color:var(--text)}
    .page-header{max-width:800px;margin:0 auto;padding:8rem 3rem 3rem;border-bottom:0.5px solid var(--faint)}
    .page-label{font-family:'Cinzel',serif;font-size:11px;letter-spacing:0.22em;color:var(--muted);margin-bottom:1rem}
    h1{font-size:clamp(30px,4vw,46px);font-weight:300;font-style:italic;color:var(--text);line-height:1.2}
    .writings-list{max-width:800px;margin:0 auto;padding:0 3rem 2rem}
    .writing-row{display:flex;align-items:baseline;justify-content:space-between;gap:2rem;padding:2rem 0;border-bottom:0.5px solid var(--faint);position:relative;transition:opacity 0.2s}
    .writing-row:hover{opacity:0.75}
    .writing-title{font-size:22px;color:var(--text);margin-bottom:0.4rem;display:block;cursor:pointer}
    .writing-excerpt{font-style:italic;font-size:15px;color:rgba(232,226,216,0.35);line-height:1.6;max-width:500px}
    .writing-right{text-align:right;flex-shrink:0}
    .writing-date{font-family:'Inter',sans-serif;font-size:10px;letter-spacing:0.1em;color:rgba(232,226,216,0.2);display:block;margin-bottom:0.4rem}
    .writing-tag{font-family:'Inter',sans-serif;font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:rgba(232,226,216,0.15);border:0.5px solid rgba(232,226,216,0.1);border-radius:2px;padding:2px 6px}
    .add-entry-btn-wrap{max-width:800px;margin:0 auto;padding:0 3rem 5rem}
    /* Article */
    .article-view{display:none;max-width:680px;margin:0 auto;padding:8rem 3rem 6rem;animation:fadeUp 0.4s ease both}
    .article-view.visible{display:block}
    .back-btn{font-family:'Inter',sans-serif;font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);background:none;border:none;cursor:pointer;margin-bottom:3rem;display:block;transition:color 0.2s}
    .back-btn:hover{color:var(--text)}
    .article-date{font-family:'Inter',sans-serif;font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:rgba(232,226,216,0.25);margin-bottom:1.5rem;display:block}
    .article-title-el{font-size:clamp(28px,4vw,42px);font-weight:300;font-style:italic;line-height:1.2;color:var(--text);margin-bottom:3rem}
    .article-body p{font-size:18px;line-height:1.95;color:rgba(232,226,216,0.65);margin-bottom:1.75rem}
    .article-body p:first-child{font-size:20px;color:rgba(232,226,216,0.75)}
    .article-body p.sep{text-align:center;color:rgba(232,226,216,0.15);font-size:18px;letter-spacing:0.5em;margin:2rem 0}
    footer{border-top:0.5px solid var(--faint);padding:2rem 3rem;display:flex;justify-content:space-between;align-items:center;max-width:800px;margin:0 auto}
    footer p{font-family:'Inter',sans-serif;font-size:10px;letter-spacing:0.1em;color:rgba(232,226,216,0.2)}
    @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    @media(max-width:768px){
      nav{padding:1.25rem 1.5rem}.nav-links{gap:1.5rem}
      .page-header{padding:7rem 1.5rem 2rem}
      .writings-list,.add-entry-btn-wrap{padding-left:1.5rem;padding-right:1.5rem}
      .writing-row{flex-direction:column;gap:0.5rem}.writing-right{text-align:left}
      .article-view{padding:7rem 1.5rem 4rem}
      footer{padding:1.5rem;flex-direction:column;gap:0.5rem}
    }
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="nav-name">VOTRE NOM</a>
    <ul class="nav-links">
      <li><a href="index.html">Musique</a></li>
      <li><a href="journal.html">Journal</a></li>
      <li><a href="ecrits.html" class="active">Écrits</a></li>
      <li><a href="index.html#about">À propos</a></li>
    </ul>
  </nav>

  <!-- LISTE -->
  <div id="listView">
    <header class="page-header">
      <p class="page-label">Écrits</p>
      <h1>Fragments,<br>réflexions.</h1>
    </header>
    <div class="writings-list" id="list-ecrits"></div>
    <div class="add-entry-btn-wrap">
      <button class="add-entry-btn" onclick="addEcrit()">+ Ajouter un texte</button>
    </div>
  </div>

  <!-- ARTICLE -->
  <div class="article-view" id="articleView">
    <button class="back-btn" onclick="showList()">← Retour aux écrits</button>
    <span class="article-date" id="artMeta"></span>
    <h2 class="article-title-el" id="artTitle"></h2>
    <div class="article-body" id="artBody"></div>
    <div id="artEditHint" style="display:none;margin-top:2rem;font-family:Inter,sans-serif;font-size:10px;letter-spacing:0.1em;color:rgba(232,226,216,0.25);">
      Le corps du texte est éditable directement — cliquez pour modifier.
    </div>
  </div>

  <footer>
    <p>© 2025 Votre Nom</p>
    <a href="index.html" style="font-family:Inter,sans-serif;font-size:10px;letter-spacing:0.1em;color:rgba(232,226,216,0.2);text-decoration:none;">← Retour à l'accueil</a>
  </footer>

  <script src="admin.js"></script>
  <script>
    let currentArticleIdx = null;

    function renderEcrits() {
      const data = getData();
      const list = document.getElementById('list-ecrits');
      list.innerHTML = '';
      (data.ecrits || []).forEach((e, i) => {
        const row = document.createElement('div');
        row.className = 'writing-row';
        row.innerHTML = `
          <div class="writing-left" style="flex:1">
            <span class="writing-title" data-edit="ecrit-${i}-title" ${editMode?'contenteditable=true':''}
              onclick="${editMode?'':'showArticle('+i+')'}">${e.title}</span>
            <p class="writing-excerpt" data-edit="ecrit-${i}-excerpt" ${editMode?'contenteditable=true':''}>${e.excerpt}</p>
          </div>
          <div class="writing-right">
            <span class="writing-date" data-edit="ecrit-${i}-date" ${editMode?'contenteditable=true':''}>${e.date}</span>
            <span class="writing-tag" data-edit="ecrit-${i}-tag" ${editMode?'contenteditable=true':''}>${e.tag}</span>
          </div>
          <button class="entry-delete" onclick="deleteEcrit(${i})">× Supprimer</button>
        `;
        // Si pas en mode édition, toute la ligne est cliquable
        if (!editMode) row.style.cursor = 'pointer';
        row.addEventListener('click', (ev) => {
          if (editMode) return;
          if (ev.target.classList.contains('entry-delete')) return;
          showArticle(i);
        });
        row.querySelectorAll('[data-edit]').forEach(node => {
          node.addEventListener('input', () => {
            const field = node.dataset.edit.split('-').pop();
            saveEntryEcrit(i, field, node.innerHTML);
          });
        });
        list.appendChild(row);
      });
    }

    function saveEntryEcrit(i, field, value) {
      const data = getData();
      if (data.ecrits[i]) data.ecrits[i][field] = value;
      saveData(data);
    }

    function deleteEcrit(i) {
      if (!confirm('Supprimer ce texte ?')) return;
      const data = getData();
      data.ecrits.splice(i, 1);
      saveData(data);
      renderEcrits();
      showToast('Texte supprimé');
    }

    function addEcrit() {
      const data = getData();
      data.ecrits.unshift({
        title: 'Titre du texte',
        excerpt: 'Une phrase d\'introduction...',
        date: 'Mois AAAA',
        tag: 'Essai',
        body: '<p>Écrivez votre texte ici. En mode édition, ce corps est directement modifiable depuis la vue article.</p>'
      });
      saveData(data);
      renderEcrits();
      showToast('Texte ajouté');
    }

    function showArticle(idx) {
      const data = getData();
      const e = data.ecrits[idx];
      if (!e) return;
      currentArticleIdx = idx;
      document.getElementById('artMeta').textContent = e.date + ' · ' + e.tag;
      document.getElementById('artTitle').textContent = e.title;

      const body = document.getElementById('artBody');
      body.innerHTML = e.body;

      if (editMode) {
        body.contentEditable = 'true';
        body.style.outline = '0.5px dashed rgba(232,226,216,0.25)';
        body.style.outlineOffset = '8px';
        body.style.borderRadius = '2px';
        body.addEventListener('input', () => {
          const d = getData();
          if (d.ecrits[idx]) { d.ecrits[idx].body = body.innerHTML; saveData(d); }
        });
        document.getElementById('artEditHint').style.display = 'block';
      } else {
        body.contentEditable = 'false';
        body.style.outline = '';
        document.getElementById('artEditHint').style.display = 'none';
      }

      document.getElementById('listView').style.display = 'none';
      document.getElementById('articleView').classList.add('visible');
      window.scrollTo(0, 0);
    }

    function showList() {
      document.getElementById('listView').style.display = 'block';
      document.getElementById('articleView').classList.remove('visible');
      currentArticleIdx = null;
      window.scrollTo(0, 0);
    }

    window.onEditModeEnabled = () => {
      renderEcrits();
      if (currentArticleIdx !== null) showArticle(currentArticleIdx);
    };
    window.onEditModeDisabled = () => {
      renderEcrits();
      if (currentArticleIdx !== null) showArticle(currentArticleIdx);
    };

    document.addEventListener('DOMContentLoaded', () => {
      renderEcrits();
    });
  </script>
</body>
</html>
