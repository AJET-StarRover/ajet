<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Journal — VOTRE NOM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cinzel:wght@400;500&family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0e0d0c;--text:#e8e2d8;--muted:rgba(232,226,216,0.45);--faint:rgba(232,226,216,0.12)}
    body{background:var(--bg);color:var(--text);font-family:'Cormorant Garamond',serif;min-height:100vh;overflow-x:hidden}
    body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:100;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");opacity:0.6}
    nav{position:fixed;top:0;left:0;right:0;z-index:50;display:flex;justify-content:space-between;align-items:center;padding:1.5rem 3rem;border-bottom:0.5px solid var(--faint);background:rgba(14,13,12,0.85);backdrop-filter:blur(12px)}
    .nav-name{font-family:'Cinzel',serif;font-size:12px;letter-spacing:0.25em;color:var(--text);text-decoration:none;opacity:0.9}
    .nav-links{display:flex;gap:2.5rem;list-style:none}
    .nav-links a{font-family:'Inter',sans-serif;font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:var(--muted);text-decoration:none;transition:color 0.25s}
    .nav-links a:hover,.nav-links a.active{color:var(--text)}
    .page-header{max-width:1100px;margin:0 auto;padding:8rem 3rem 3rem;border-bottom:0.5px solid var(--faint)}
    .page-title{font-family:'Cinzel',serif;font-size:11px;letter-spacing:0.22em;color:var(--muted);margin-bottom:1rem}
    h1{font-family:'Cormorant Garamond',serif;font-size:clamp(30px,4vw,46px);font-weight:300;font-style:italic;color:var(--text);line-height:1.2}
    .tabs{max-width:1100px;margin:0 auto;display:flex;border-bottom:0.5px solid var(--faint)}
    .tab{font-family:'Inter',sans-serif;font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:var(--muted);background:none;border:none;padding:1.25rem 2rem;cursor:pointer;transition:color 0.2s;border-bottom:1px solid transparent;position:relative;top:0.5px}
    .tab.active{color:var(--text);border-bottom-color:var(--text)}
    .content{max-width:1100px;margin:0 auto;padding:0 3rem 5rem}
    .panel{display:none}.panel.active{display:block}
    .entries-list{padding-top:2.5rem}
    .entry{display:grid;grid-template-columns:120px 1fr;gap:2rem;padding:2.5rem 0;border-bottom:0.5px solid var(--faint);position:relative}
    .entry-date{font-family:'Inter',sans-serif;font-size:10px;letter-spacing:0.12em;color:rgba(232,226,216,0.2);padding-top:4px}
    .entry-title{font-size:22px;color:var(--text);margin-bottom:0.25rem}
    .entry-meta{font-family:'Inter',sans-serif;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:rgba(232,226,216,0.25);margin-bottom:1rem}
    .entry-note{font-style:italic;font-size:17px;line-height:1.8;color:rgba(232,226,216,0.5)}
    .entry-tag{display:inline-block;margin-top:0.75rem;font-family:'Inter',sans-serif;font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:rgba(232,226,216,0.2);border:0.5px solid rgba(232,226,216,0.12);border-radius:2px;padding:3px 8px}
    .book-entry{padding:2rem 0;border-bottom:0.5px solid var(--faint);display:flex;justify-content:space-between;align-items:flex-start;gap:2rem;position:relative}
    .book-title{font-size:20px;color:var(--text);margin-bottom:0.2rem}
    .book-author{font-style:italic;font-size:15px;color:var(--muted);margin-bottom:0.75rem}
    .book-note{font-size:16px;line-height:1.75;color:rgba(232,226,216,0.45);max-width:600px}
    .book-meta{font-family:'Inter',sans-serif;font-size:10px;letter-spacing:0.1em;color:rgba(232,226,216,0.2);text-align:right;flex-shrink:0;padding-top:4px}
    footer{border-top:0.5px solid var(--faint);padding:2rem 3rem;display:flex;justify-content:space-between;align-items:center;max-width:1100px;margin:0 auto}
    footer p{font-family:'Inter',sans-serif;font-size:10px;letter-spacing:0.1em;color:rgba(232,226,216,0.2)}
    @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    .entry,.book-entry{animation:fadeUp 0.3s ease both}
    @media(max-width:768px){
      nav{padding:1.25rem 1.5rem}.nav-links{gap:1.5rem}
      .page-header{padding:7rem 1.5rem 2rem}.tabs .tab{padding:1rem 1.25rem}
      .content{padding:0 1.5rem 4rem}.entry{grid-template-columns:1fr;gap:0.5rem}
      .book-entry{flex-direction:column;gap:0.5rem}.book-meta{text-align:left}
      footer{padding:1.5rem;flex-direction:column;gap:0.5rem}
    }
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="nav-name">VOTRE NOM</a>
    <ul class="nav-links">
      <li><a href="index.html">Musique</a></li>
      <li><a href="journal.html" class="active">Journal</a></li>
      <li><a href="ecrits.html">Écrits</a></li>
      <li><a href="index.html#about">À propos</a></li>
    </ul>
  </nav>

  <header class="page-header">
    <p class="page-title">Journal</p>
    <h1>Ce que je vois,<br>ce que je lis.</h1>
  </header>

  <div class="tabs">
    <button class="tab active" onclick="showTab('films')">Films & Séries</button>
    <button class="tab" onclick="showTab('livres')">Livres</button>
  </div>

  <div class="content">
    <div class="panel active" id="panel-films">
      <div class="entries-list" id="list-films"></div>
      <button class="add-entry-btn" onclick="addFilm()">+ Ajouter un film / une série</button>
    </div>
    <div class="panel" id="panel-livres">
      <div class="entries-list" id="list-livres"></div>
      <button class="add-entry-btn" onclick="addLivre()">+ Ajouter un livre</button>
    </div>
  </div>

  <footer>
    <p>© 2025 Votre Nom</p>
    <a href="index.html" style="font-family:Inter,sans-serif;font-size:10px;letter-spacing:0.1em;color:rgba(232,226,216,0.2);text-decoration:none;">← Retour</a>
  </footer>

  <script src="admin.js"></script>
  <script>
    function showTab(name) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      document.querySelector('[onclick="showTab(\''+name+'\')"]').classList.add('active');
      document.getElementById('panel-'+name).classList.add('active');
    }
    if (window.location.hash === '#livres') setTimeout(() => showTab('livres'), 50);

    // ── Rendu Films
    function renderFilms() {
      const data = getData();
      const list = document.getElementById('list-films');
      list.innerHTML = '';
      (data.films || []).forEach((f, i) => {
        const el = document.createElement('div');
        el.className = 'entry';
        el.innerHTML = `
          <div class="entry-date" data-edit="film-${i}-date" ${editMode?'contenteditable=true':''}>${f.date}</div>
          <div>
            <p class="entry-title" data-edit="film-${i}-title" ${editMode?'contenteditable=true':''}>${f.title}</p>
            <p class="entry-meta" data-edit="film-${i}-meta" ${editMode?'contenteditable=true':''}>${f.meta}</p>
            <p class="entry-note" data-edit="film-${i}-note" ${editMode?'contenteditable=true':''}>${f.note}</p>
            <span class="entry-tag" data-edit="film-${i}-tag" ${editMode?'contenteditable=true':''}>${f.tag}</span>
          </div>
          <button class="entry-delete" onclick="deleteFilm(${i})" title="Supprimer">× Supprimer</button>
        `;
        el.querySelectorAll('[data-edit]').forEach(node => {
          node.addEventListener('input', () => saveEntryFilm(i, node.dataset.edit.split('-').pop(), node.innerHTML));
        });
        list.appendChild(el);
      });
    }

    function saveEntryFilm(i, field, value) {
      const data = getData();
      if (data.films[i]) data.films[i][field] = value;
      saveData(data);
    }

    function deleteFilm(i) {
      if (!confirm('Supprimer cette entrée ?')) return;
      const data = getData();
      data.films.splice(i, 1);
      saveData(data);
      renderFilms();
      showToast('Entrée supprimée');
    }

    function addFilm() {
      const data = getData();
      data.films.unshift({ date: 'Mois AAAA', title: 'Titre', meta: 'Réalisateur · Année · Type', note: 'Votre note ici.', tag: 'Film' });
      saveData(data);
      renderFilms();
      showToast('Entrée ajoutée');
    }

    // ── Rendu Livres
    function renderLivres() {
      const data = getData();
      const list = document.getElementById('list-livres');
      list.innerHTML = '';
      (data.livres || []).forEach((l, i) => {
        const el = document.createElement('div');
        el.className = 'book-entry';
        el.innerHTML = `
          <div class="book-main">
            <p class="book-title" data-edit="livre-${i}-title" ${editMode?'contenteditable=true':''}>${l.title}</p>
            <p class="book-author" data-edit="livre-${i}-author" ${editMode?'contenteditable=true':''}>${l.author}</p>
            <p class="book-note" data-edit="livre-${i}-note" ${editMode?'contenteditable=true':''}>${l.note}</p>
          </div>
          <div class="book-meta">
            <span data-edit="livre-${i}-status" ${editMode?'contenteditable=true':''}>${l.status}</span><br>
            <span data-edit="livre-${i}-date" ${editMode?'contenteditable=true':''}>${l.date}</span>
          </div>
          <button class="entry-delete" onclick="deleteLivre(${i})" title="Supprimer">× Supprimer</button>
        `;
        el.querySelectorAll('[data-edit]').forEach(node => {
          node.addEventListener('input', () => saveEntryLivre(i, node.dataset.edit.split('-').pop(), node.innerHTML));
        });
        list.appendChild(el);
      });
    }

    function saveEntryLivre(i, field, value) {
      const data = getData();
      if (data.livres[i]) data.livres[i][field] = value;
      saveData(data);
    }

    function deleteLivre(i) {
      if (!confirm('Supprimer cette entrée ?')) return;
      const data = getData();
      data.livres.splice(i, 1);
      saveData(data);
      renderLivres();
      showToast('Entrée supprimée');
    }

    function addLivre() {
      const data = getData();
      data.livres.unshift({ title: 'Titre', author: 'Auteur', note: 'Votre note ici.', status: 'En cours', date: 'Mois AAAA' });
      saveData(data);
      renderLivres();
      showToast('Entrée ajoutée');
    }

    // ── Re-render quand le mode édition change
    window.onEditModeEnabled = () => { renderFilms(); renderLivres(); };
    window.onEditModeDisabled = () => { renderFilms(); renderLivres(); };

    // ── Init
    document.addEventListener('DOMContentLoaded', () => {
      renderFilms();
      renderLivres();
    });
  </script>
</body>
</html>
